name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install maturin
        run: pip install maturin
      - name: Build wheels
        run: maturin build --manifest-path dig-core/Cargo.toml --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: dig-linux-${{ matrix.python-version }}
          path: dist/*.whl

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install maturin
        run: pip install maturin
      - name: Build wheels
        run: maturin build --manifest-path dig-core/Cargo.toml --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: dig-windows-${{ matrix.python-version }}
          path: dist/*.whl

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install maturin
        run: pip install maturin
      - name: Build wheels
        run: maturin build --manifest-path dig-core/Cargo.toml --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: dig-macos-${{ matrix.python-version }}
          path: dist/*.whl