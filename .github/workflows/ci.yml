name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - name: Install Python deps
        run: pip install ruff mypy
      - name: Lint Python
        run: ruff check dig/
      - name: Lint Rust
        run: cargo clippy --manifest-path dig-core/Cargo.toml -- -D warnings

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Run Rust tests
        run: cargo test --manifest-path dig-core/Cargo.toml

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install maturin
        run: pip install maturin
      - name: Build Rust extension
        run: maturin develop --manifest-path dig-core/Cargo.toml
      - name: Install Python deps
        run: pip install numpy scipy pandas rasterio pyproj pytest
      - name: Run Python tests
        run: python -m pytest dig/tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: [lint, test-rust, test-python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install maturin
        run: pip install maturin
      - name: Build wheel
        run: maturin build --manifest-path dig-core/Cargo.toml --release
      - uses: actions/upload-artifact@v4
        with:
          name: dig-wheel
          path: target/wheels/*.whl